        <h1>Kurdistan AI — یەکەمین و گەورەترین کۆمەڵگای زیرەکی دەستکرد لە کوردستان</h1>
        <p>Kurdistan AI (kurdistanai.app) یەکەمین پلاتفۆرمی کوردییە بۆ زیرەکی دەستکرد (Artificial Intelligence) لە هەرێمی کوردستان و عێراق. ئەم پلاتفۆرمە بۆ هەموو گەشەپێدەران، توێژەران، و خوێندکاران دروستکراوە بۆ ئەوەی پڕۆژەکانی AI پیشان بدەن، پرسیار بکەن، و فێربن — هەمووی بە زمانی کوردی سۆرانی.</p>
        <h2>What is Kurdistan AI?</h2>
        <p>Kurdistan AI is the first and most popular artificial intelligence community platform in Kurdistan and Iraq. It is a free, open platform where Kurdish developers, researchers, and students can showcase AI projects, ask and answer technical questions, and publish educational blog posts — all in Kurdish (Sorani). Whether you search for "Kurdistan AI", "Kurd AI", "Kurdish AI", or "کوردستان ئەی ئای", this is the platform for you.</p>
        <h2>تایبەتمەندییەکان — Features</h2>
        <ul>
          <li><strong>پڕۆژەکانی AI</strong> — پیشاندانی پڕۆژەکانی زیرەکی دەستکرد لە کوردستان (AI Projects)</li>
          <li><strong>پرسیار و وەڵام</strong> — پرسیار بکە و وەڵام وەربگرە لەسەر AI, Machine Learning, Deep Learning (Q&A)</li>
          <li><strong>بابەت و فێرکاری</strong> — بابەتی فێرکاری لەسەر زیرەکی دەستکرد بە کوردی (Blog & Tutorials)</li>
          <li><strong>کۆمەڵگا</strong> — کۆمەڵگایەکی چالاک بۆ گەشەپێدەرانی کوردی AI (Community)</li>
        </ul>
        <h2>Why Kurdistan AI?</h2>
        <p>Kurdistan AI is built for the Kurdish-speaking population who want to learn and contribute to AI in their native language. Unlike other platforms, Kurdistan AI focuses specifically on the Kurdish community, providing resources, projects, and discussions entirely in Kurdish (Sorani). It is the go-to destination for anyone searching for AI in Kurdistan, Kurdish AI tools, or AI education in Kurdish.</p>
        <p>Founded by <strong>Zheer Saz (ژیرساز)</strong> and the <strong>Kurdistan AI</strong> community — two pioneering organizations dedicated to advancing AI education in Kurdistan.</p>
